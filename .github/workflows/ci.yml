name: DevOps Pipeline FINAL

on:
  push:
    branches: ["main"]

jobs:

  pruebas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar herramientas de compilacion
        run: sudo apt-get update -y && sudo apt-get install -y python3 make g++ build-essential

      - name: Limpiar base de datos
        run: rm -f proyecto-devops/database.db

      - name: Instalar dependencias y correr pruebas
        working-directory: ./proyecto-devops
        run: |
          npm install --build-from-source
          npm test

  construir-y-publicar:
    runs-on: ubuntu-latest
    needs: pruebas
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Definir nombre de imagen en minusculas
        run: echo "IMAGE_BASE=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Autenticarse en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar imagen BLUE
        uses: docker/build-push-action@v5
        with:
          context: ./proyecto-devops
          push: true
          build-args: COLOR=blue
          tags: |
            ${{ env.IMAGE_BASE }}/app-blue:${{ steps.vars.outputs.tag }}
            ${{ env.IMAGE_BASE }}/app-blue:latest

      - name: Construir y publicar imagen GREEN
        uses: docker/build-push-action@v5
        with:
          context: ./proyecto-devops
          push: true
          build-args: COLOR=green
          tags: |
            ${{ env.IMAGE_BASE }}/app-green:${{ steps.vars.outputs.tag }}
            ${{ env.IMAGE_BASE }}/app-green:latest

  despliegue:
    runs-on: ubuntu-latest
    needs: construir-y-publicar
    steps:
      - name: Despliegue Blue-Green en GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            TAG="${{ needs.construir-y-publicar.outputs.tag }}"
            REPO=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')

            cd ~/extradevops

            if [ -f .current_color ]; then
              LAST=$(cat .current_color)
            else
              LAST=blue
            fi

            [ "$LAST" = "blue" ] && NEXT=green || NEXT=blue

            echo "Ultimo: $LAST | Desplegando: $NEXT"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull $REPO/app-$NEXT:$TAG

            docker stop app-next 2>/dev/null || true
            docker rm   app-next 2>/dev/null || true

            docker run -d \
              --name app-next \
              --network extradevops_default \
              -e VERSION=$NEXT \
              -e PORT=3000 \
              -p 3005:3000 \
              $REPO/app-$NEXT:$TAG

            STATUS=0
            for i in $(seq 1 15); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3005/health)
              [ "$STATUS" = "200" ] && echo "Saludable en intento $i" && break
              echo "Esperando ($i/15)..."
              sleep 3
            done

            if [ "$STATUS" != "200" ]; then
              echo "Candidato no responde - rollback, $LAST sigue activo"
              docker stop app-next || true
              docker rm   app-next || true
              exit 1
            fi

            docker stop app-active 2>/dev/null || true
            docker rm   app-active 2>/dev/null || true
            docker rename app-next app-active

            docker exec nginx-proxy nginx -s reload

            docker image prune -af --filter "until=24h" || true

            echo "$NEXT" > .current_color
            echo "Deploy exitoso - activo: $NEXT"

  pruebas-carga:
    runs-on: ubuntu-latest
    needs: despliegue
    steps:
      - name: Instalar k6
        run: |
          sudo apt-get update && sudo apt-get install -y ca-certificates gnupg
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Correr pruebas de carga contra produccion
        env:
          GCP_HOST: ${{ secrets.NGINX_IP }}
        run: |
          cat > /tmp/k6-script.js << 'K6EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';

          export const options = {
            stages: [
              { duration: '10s', target: 10 },
              { duration: '20s', target: 30 },
              { duration: '10s', target: 0  },
            ],
            thresholds: {
              http_req_duration: ['p(95)<500'],
              http_req_failed:   ['rate<0.05'],
            },
          };

          export default function () {
            const BASE_URL = `http://${__ENV.GCP_HOST}`;

            const health = http.get(`${BASE_URL}/health`);
            check(health, { 'health 200': (r) => r.status === 200 });

            const register = http.post(
              `${BASE_URL}/api/auth/register`,
              JSON.stringify({ username: `user_${__VU}_${__ITER}`, password: '123456' }),
              { headers: { 'Content-Type': 'application/json' } }
            );
            check(register, { 'register ok': (r) => r.status === 200 || r.status === 409 });

            sleep(1);
          }
          K6EOF
          k6 run /tmp/k6-script.js